# ============================================================
# NutriGuide Docker Compose — 一键启动
# 使用: docker compose up -d
# ============================================================

services:
  nutriguide:
    build: .
    container_name: nutriguide
    restart: unless-stopped
    ports:
      - "${PORT:-3030}:${PORT:-3030}"
    volumes:
      # SQLite 数据持久化（容器销毁数据不丢）
      - nutriguide_data:/app/data
    environment:
      - PORT=${PORT:-3030}
      - NODE_ENV=production
      - DB_PATH=/app/data/nutriguide.db
      - JWT_SECRET=${JWT_SECRET:-nutriguide-dev-secret-change-in-production}

      # SMTP 邮件（可选，不配则验证码打印到控制台）
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_SECURE=${SMTP_SECURE:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}

      # LLM API Keys（可选，至少配一个才有 AI 能力）
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

      # 前端地址
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3030}

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3030/api/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  nutriguide_data:
    name: nutriguide_data
