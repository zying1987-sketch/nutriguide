# ============================================================
# Render Blueprint — 一键部署 NutriGuide
# 使用: 在 Render Dashboard → Blueprints → 连接 GitHub 仓库
# ============================================================

services:
  - type: web
    name: nutriguide
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      # 服务器端口（Render 自动注入，无需手动设置）
      # PORT: auto

      # JWT 密钥（自动生成随机字符串）
      - key: JWT_SECRET
        generateValue: true

      # 数据库路径（持久化磁盘挂载点）
      - key: DB_PATH
        value: /app/data/nutriguide.db

      # 以下密钥需要在 Render Dashboard → Environment 手动填入
      # 或者部署后在 Render 后台设置
      # - key: DASHSCOPE_API_KEY
      #   sync: false
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   sync: false
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false

    # 持久化磁盘（SQLite 数据）
    disk:
      name: nutriguide-data
      mountPath: /app/data
      sizeGB: 1
