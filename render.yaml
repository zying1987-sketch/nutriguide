services:
  - type: web
    name: nutriguide-ai
    env: docker
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /app/data/nutriguide.db
    disk:
      name: nutriguide-data
      mountPath: /app/data
      sizeGB: 1
